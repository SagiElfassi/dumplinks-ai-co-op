services:
  - type: web
    name: dumplinks-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    nodeVersion: 20
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # set in Render dashboard — use your Atlas connection string
      - key: JWT_SECRET
        sync: false  # set in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false  # set in Render dashboard
      - key: FRONTEND_URL
        sync: false  # set in Render dashboard — your frontend's Render URL

  - type: web
    name: dumplinks-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
